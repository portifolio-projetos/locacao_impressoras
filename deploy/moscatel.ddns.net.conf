server {
    listen 80;
    server_name moscatel.ddns.net 18.220.171.193;

    client_max_body_size 20M;

    location /static/ {
        alias /opt/printflow/staticfiles/;
    }

    location /media/ {
        alias /opt/printflow/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-printflow/gunicorn.sock;
    }
}
